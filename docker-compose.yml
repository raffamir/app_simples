services:
  db:
    image: postgres:15-alpine
    container_name: joao_db
    environment:
      POSTGRES_USER: fatec_user
      POSTGRES_PASSWORD: fatec_password
      POSTGRES_DB: todolist
    volumes:
      - joao_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: joao_api
    restart: always
    environment:
      DB_HOST: db
    depends_on:
      - db
    # Removido ports para ninguém acessar a API direto de fora

  web:
    build: ./frontend
    container_name: joao_web
    ports:
      - "8001:80"
    depends_on:
      - api
    links:
      - api # Isso garante que o Nginx dentro do 'web' resolva o nome 'api'

volumes:
  joao_data: