services:
  db:
    image: postgres:15-alpine
    container_name: joao_db
    environment:
      POSTGRES_USER: fatec_user
      POSTGRES_PASSWORD: fatec_password
      POSTGRES_DB: todolist
    volumes:
      - joao_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: joao_api
    restart: always
    environment:
      DB_HOST: db
    depends_on:
      - db
    # Mantenha sem 'ports' para ninguém acessar de fora

  web:
    build: ./frontend
    container_name: joao_web
    ports:
      - "8001:80"
    depends_on:
      - api
    # O comando 'links' ajuda o Nginx a achar o container 'api' pelo nome
    links:
      - api

volumes:
  joao_data: