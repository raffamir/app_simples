<!DOCTYPE html>
<html>
<head>
    <title>FATEC ToDo List</title>
    <style>body { font-family: sans-serif; padding: 20px; }</style>
</head>
<body>
    <h1>Minhas Tarefas</h1>
    <input type="text" id="taskInput" placeholder="Nova tarefa">
    <button onclick="addTask()">Adicionar</button>
    <ul id="taskList"></ul>

    <script>
        async function loadTasks() {
            const res = await fetch('http://localhost:3000/tarefas');
            const tasks = await res.json();
            const list = document.getElementById('taskList');
            list.innerHTML = tasks.map(t => `<li>${t.titulo}</li>`).join('');
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            await fetch('http://localhost:3000/tarefas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo: input.value })
            });
            input.value = '';
            loadTasks();
        }
        loadTasks();
    </script>
</body>
</html>
